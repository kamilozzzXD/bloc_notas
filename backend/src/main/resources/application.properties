spring.application.name=bloc-notas-backend

# =============================================
# DATASOURCE - MySQL via variables de entorno
# =============================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bloc_notas}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# HIKARICP - Pool de conexiones (plan gratuito)
# =============================================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
# Genera una clave segura de al menos 64 caracteres (Base64).
# Puedes usar: openssl rand -base64 64
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1ibG9jLW5vdGFzLWFwcC0yMDI0}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================
# SERVIDOR
# =============================================
server.port=${PORT:8080}
