spring.application.name=bloc-notas-backend

# =============================================
# DATASOURCE - MySQL via variables de entorno
# =============================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bloc_notas}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# HIKARICP - Pool de conexiones (plan gratuito)
# =============================================
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT
# =============================================
# Genera una clave segura de al menos 64 caracteres (Base64).
# Puedes usar: openssl rand -base64 64
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci1ibG9jLW5vdGFzLWFwcC0yMDI0}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================
# CORS (Configuración para credenciales y headers)
# =============================================
# Nota: Si el frontend usa withCredentials: true, allowed-origins debe ser explícito
# Exponer Authorization permite que el cliente lea el token en la respuesta
app.cors.allowed-headers=Authorization, Content-Type, X-Requested-With, Accept, Origin
app.cors.exposed-headers=Authorization

# =============================================
# SERVIDOR
# =============================================
server.port=${PORT:8080}

# =============================================
# SECURITY
# =============================================
# Nota: Asegurar que /api/notas/** requiere autenticación en SecurityConfig.java

# =============================================
# LOGGING - Debug JWT en local (desactivar en prod)
# =============================================
# Muestra los pasos del JwtAuthFilter en consola:
#   [JWT] Token recibido para: GET /api/notas
#   [JWT] Token válido para usuario 'camil' ✓
# Para silenciar en producción: cambia DEBUG por WARN
logging.level.com.blocnotas.backend.security.JwtAuthFilter=DEBUG
logging.level.com.blocnotas.backend.security.JwtUtils=DEBUG
# Descomenta la siguiente línea para ver el flujo completo de Spring Security:
# logging.level.org.springframework.security=DEBUG


spring.main.lazy-initialization=true